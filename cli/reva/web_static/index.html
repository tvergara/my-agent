<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>reva view</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      background:
        radial-gradient(at 20% 0%, rgba(56, 189, 248, 0.06) 0px, transparent 50%),
        radial-gradient(at 80% 100%, rgba(168, 85, 247, 0.06) 0px, transparent 50%),
        #09090b;
    }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

    .tool-color-dark-orange  { color: #fb923c; }
    .tool-color-steel-blue   { color: #60a5fa; }
    .tool-color-medium-orchid{ color: #c084fc; }
    .tool-color-turquoise2   { color: #22d3ee; }
    .tool-color-khaki1       { color: #facc15; }
    .tool-color-spring-green2{ color: #4ade80; }
    .tool-color-yellow       { color: #eab308; }

    .step pre {
      white-space: pre-wrap;
      word-break: break-word;
    }
    .step-agent .step-message pre { color: #f4f4f5; }
    .step-system .step-message pre { color: #a1a1aa; font-style: italic; }
    .step-user .step-message pre { color: #93c5fd; }

    details > summary { cursor: pointer; list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    details[open] > summary .chevron { transform: rotate(90deg); }
    .chevron { transition: transform 150ms ease; display: inline-block; }
  </style>
</head>
<body class="h-full text-zinc-100 font-sans antialiased">
  <div class="h-screen flex">
    <!-- Sidebar -->
    <aside class="w-72 shrink-0 border-r border-zinc-800 bg-zinc-950/80 backdrop-blur flex flex-col">
      <header class="px-5 pt-5 pb-3">
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
          <h1 class="text-lg font-semibold tracking-tight">reva view</h1>
        </div>
        <p class="text-xs text-zinc-500 mt-1">ATIF trajectory viewer</p>
      </header>
      <div class="px-3 pb-3">
        <button id="refresh-btn" class="w-full text-xs text-zinc-400 hover:text-zinc-200 border border-zinc-800 hover:border-zinc-700 rounded px-2 py-1.5 transition">
          ↻ refresh agents
        </button>
      </div>
      <nav id="agent-list" class="flex-1 overflow-y-auto px-2 pb-4 space-y-1"></nav>
      <footer class="px-5 py-3 border-t border-zinc-900 text-[10px] text-zinc-600 font-mono">
        schema: ATIF-v1.4
      </footer>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <header id="main-header" class="px-8 py-5 border-b border-zinc-800 flex items-center justify-between">
        <div>
          <h2 id="agent-name" class="text-xl font-semibold">select an agent</h2>
          <p id="agent-meta" class="text-xs text-zinc-500 mt-1 font-mono"></p>
        </div>
        <div id="metrics" class="text-xs font-mono text-zinc-400 flex gap-4"></div>
      </header>

      <section id="trajectory" class="flex-1 overflow-y-auto px-8 py-6 space-y-3 max-w-5xl w-full mx-auto"></section>
    </main>
  </div>

  <template id="tpl-empty">
    <div class="text-zinc-500 text-sm italic text-center mt-12">
      Pick an agent from the sidebar.
    </div>
  </template>

  <script>
    const $ = (sel, root=document) => root.querySelector(sel);
    const h = (tag, attrs={}, ...children) => {
      const el = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') el.className = v;
        else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
        else if (v !== null && v !== undefined) el.setAttribute(k, v);
      }
      for (const c of children.flat()) {
        if (c == null) continue;
        el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
      return el;
    };

    const state = {
      currentAgent: null,
      eventSource: null,
      knownSteps: new Map(),
    };

    async function loadAgents() {
      const list = $('#agent-list');
      list.innerHTML = '';
      try {
        const agents = await (await fetch('/api/agents')).json();
        if (agents.length === 0) {
          list.appendChild(h('div', { class: 'text-xs text-zinc-600 px-3 py-2' }, 'no agents found'));
          return;
        }
        for (const a of agents) {
          const item = h(
            'button',
            {
              class: `w-full text-left px-3 py-2 rounded border transition
                      ${state.currentAgent === a.name
                        ? 'bg-zinc-900 border-zinc-700'
                        : 'border-transparent hover:bg-zinc-900/60 hover:border-zinc-800'}`,
              onclick: () => selectAgent(a.name),
            },
            h('div', { class: 'flex items-center justify-between gap-2' },
              h('span', { class: 'font-medium text-sm truncate' }, a.name),
              a.running
                ? h('span', { class: 'w-1.5 h-1.5 rounded-full bg-emerald-400 shrink-0' })
                : h('span', { class: 'w-1.5 h-1.5 rounded-full bg-zinc-700 shrink-0' })
            ),
            h('div', { class: 'text-[10px] text-zinc-500 mt-0.5 font-mono flex gap-2' },
              h('span', {}, a.backend),
              h('span', {}, '·'),
              h('span', {}, `${a.step_count} steps`)
            ),
          );
          list.appendChild(item);
        }
      } catch (e) {
        list.appendChild(h('div', { class: 'text-xs text-red-400 px-3 py-2' }, 'failed to load agents'));
      }
    }

    async function selectAgent(name) {
      state.currentAgent = name;
      state.knownSteps.clear();
      $('#agent-name').textContent = name;
      $('#agent-meta').textContent = 'loading…';
      $('#metrics').textContent = '';
      $('#trajectory').innerHTML = '';
      loadAgents(); // reflect selection styling
      closeStream();

      try {
        const traj = await (await fetch(`/api/agents/${encodeURIComponent(name)}/trajectory`)).json();
        renderTrajectory(traj);
      } catch (e) {
        $('#trajectory').appendChild(h('div', { class: 'text-red-400 text-sm' }, 'failed to load trajectory'));
      }

      openStream(name);
    }

    function renderTrajectory(traj) {
      const tgt = $('#trajectory');
      tgt.innerHTML = '';
      state.knownSteps.clear();
      const steps = traj.steps || [];
      for (const step of steps) appendStep(step);
      updateHeader(traj);
    }

    function appendStep(step) {
      if (state.knownSteps.has(step.step_id)) return;
      state.knownSteps.set(step.step_id, step);
      const el = renderStep(step);
      $('#trajectory').appendChild(el);
      // auto-scroll
      const container = $('#trajectory');
      container.scrollTop = container.scrollHeight;
    }

    function renderStep(step) {
      const source = step.source || 'system';
      const sourceColors = {
        user: 'border-blue-500/40 bg-blue-950/20',
        agent: 'border-zinc-700 bg-zinc-900/40',
        system: 'border-zinc-800/60 bg-zinc-950/40',
      };
      const sourceBadges = {
        user: 'bg-blue-500/20 text-blue-300 border-blue-500/40',
        agent: 'bg-emerald-500/20 text-emerald-300 border-emerald-500/40',
        system: 'bg-zinc-700/40 text-zinc-400 border-zinc-700/60',
      };

      const article = h(
        'article',
        {
          class: `step step-${source} border rounded-lg ${sourceColors[source] || sourceColors.system} overflow-hidden`,
        },
      );

      const header = h(
        'header',
        { class: 'flex items-center gap-3 px-4 py-2 border-b border-zinc-800/60 text-xs font-mono' },
        h('span', { class: 'text-zinc-600' }, `#${step.step_id}`),
        h('span', { class: `px-1.5 py-0.5 rounded border text-[10px] uppercase tracking-wider ${sourceBadges[source] || sourceBadges.system}` }, source),
        h('time', { class: 'text-zinc-600 text-[10px] ml-auto' }, formatTime(step.timestamp))
      );
      if (step.model_name) {
        header.insertBefore(
          h('span', { class: 'text-zinc-500 text-[10px]' }, step.model_name),
          header.querySelector('time')
        );
      }
      article.appendChild(header);

      const body = h('div', { class: 'px-4 py-3 space-y-3' });

      if (step.reasoning_content) {
        const details = h(
          'details',
          { class: 'rounded border border-zinc-800/60 bg-zinc-950/30' },
          h('summary', { class: 'px-3 py-1.5 text-[11px] text-zinc-500 hover:text-zinc-300 flex items-center gap-2' },
            h('span', { class: 'chevron' }, '›'),
            h('span', {}, '💭 thinking')
          ),
          h('pre', { class: 'px-3 pb-3 pt-1 text-xs text-zinc-500 italic font-mono whitespace-pre-wrap' }, step.reasoning_content)
        );
        body.appendChild(details);
      }

      if (step.message) {
        body.appendChild(
          h('div', { class: 'step-message' }, h('pre', { class: 'text-sm leading-relaxed font-sans' }, step.message))
        );
      }

      if (step.tool_calls && step.tool_calls.length) {
        const ul = h('ul', { class: 'space-y-1' });
        for (const tc of step.tool_calls) {
          const colorClass = toolColor(tc.function_name);
          const summary = summarizeToolCall(tc);
          const details = h(
            'details',
            { class: 'rounded border border-zinc-800/60 bg-zinc-950/40' },
            h('summary', { class: 'px-3 py-1.5 flex items-center gap-3 text-xs' },
              h('span', { class: 'chevron text-zinc-600' }, '›'),
              h('span', { class: `font-semibold font-mono ${colorClass}` }, `⚙ ${tc.function_name}`),
              summary ? h('span', { class: 'text-zinc-400 font-mono truncate' }, summary) : null
            ),
            h('pre', { class: 'mx-3 mb-3 mt-1 text-[11px] text-zinc-400 font-mono whitespace-pre-wrap bg-black/40 rounded p-2 border border-zinc-900' },
              JSON.stringify(tc.arguments || {}, null, 2))
          );
          ul.appendChild(h('li', {}, details));
        }
        body.appendChild(ul);
      }

      const obsResults = (step.observation && step.observation.results) || [];
      if (obsResults.length) {
        for (const r of obsResults) {
          const details = h(
            'details',
            { class: 'rounded border border-zinc-800/40 bg-zinc-950/30' },
            h('summary', { class: 'px-3 py-1.5 text-[11px] text-zinc-500 hover:text-zinc-300 flex items-center gap-2' },
              h('span', { class: 'chevron' }, '›'),
              h('span', {}, '← tool result'),
              r.source_call_id ? h('code', { class: 'text-zinc-600' }, r.source_call_id) : null
            ),
            h('pre', { class: 'mx-3 mb-3 mt-1 text-[11px] text-zinc-400 font-mono whitespace-pre-wrap bg-black/30 rounded p-2 border border-zinc-900 max-h-96 overflow-auto' },
              String(r.content || '').slice(0, 8000))
          );
          body.appendChild(details);
        }
      }

      if (step.metrics) {
        const pieces = [];
        if ('prompt_tokens' in step.metrics) pieces.push(`↑ ${step.metrics.prompt_tokens}`);
        if ('completion_tokens' in step.metrics) pieces.push(`↓ ${step.metrics.completion_tokens}`);
        if ('cost_usd' in step.metrics) pieces.push(`$${Number(step.metrics.cost_usd).toFixed(4)}`);
        if (pieces.length) {
          body.appendChild(h('div', { class: 'text-[10px] text-zinc-600 font-mono' }, pieces.join('  ')));
        }
      }

      article.appendChild(body);
      return article;
    }

    function updateHeader(traj) {
      const agent = traj.agent || {};
      $('#agent-meta').textContent = [
        agent.model_name || '',
        traj.session_id ? `session=${traj.session_id.slice(0, 8)}` : '',
        `schema=${traj.schema_version || 'unknown'}`,
      ].filter(Boolean).join(' · ');
      const fm = traj.final_metrics || {};
      const parts = [];
      if (fm.total_steps != null) parts.push(`${fm.total_steps} steps`);
      if (fm.total_prompt_tokens) parts.push(`↑ ${fm.total_prompt_tokens}`);
      if (fm.total_completion_tokens) parts.push(`↓ ${fm.total_completion_tokens}`);
      if (fm.total_cost_usd) parts.push(`$${Number(fm.total_cost_usd).toFixed(4)}`);
      $('#metrics').textContent = parts.join('  ·  ');
    }

    function formatTime(ts) {
      if (!ts) return '';
      try {
        const d = new Date(ts);
        return d.toLocaleTimeString();
      } catch {
        return ts;
      }
    }

    function toolColor(name) {
      return {
        Bash: 'tool-color-dark-orange',
        Read: 'tool-color-steel-blue',
        Write: 'tool-color-medium-orchid',
        Edit: 'tool-color-medium-orchid',
        WebFetch: 'tool-color-turquoise2',
        WebSearch: 'tool-color-turquoise2',
        Grep: 'tool-color-khaki1',
        Glob: 'tool-color-khaki1',
        Skill: 'tool-color-spring-green2',
      }[name] || 'tool-color-yellow';
    }

    function summarizeToolCall(tc) {
      const a = tc.arguments || {};
      const n = tc.function_name;
      if (n === 'Bash') return (a.command || '').trim().split('\n')[0];
      if (n === 'WebFetch') return a.url || '';
      if (n === 'Write' || n === 'Edit' || n === 'Read') return a.file_path || '';
      if (n === 'Skill') return a.skill || '';
      if (n === 'Grep' || n === 'Glob') return a.pattern || a.query || '';
      return '';
    }

    function closeStream() {
      if (state.eventSource) {
        state.eventSource.close();
        state.eventSource = null;
      }
    }

    function openStream(name) {
      const es = new EventSource(`/api/agents/${encodeURIComponent(name)}/stream`);
      state.eventSource = es;
      es.addEventListener('step', (e) => {
        try {
          const step = JSON.parse(e.data);
          appendStep(step);
        } catch {}
      });
      es.addEventListener('snapshot', (e) => {
        try {
          const traj = JSON.parse(e.data);
          updateHeader(traj);
        } catch {}
      });
      es.addEventListener('final_metrics', (e) => {
        try {
          const fm = JSON.parse(e.data);
          updateHeader({ final_metrics: fm, agent: {}, schema_version: 'ATIF-v1.4' });
        } catch {}
      });
      es.onerror = () => {
        // EventSource auto-retries; no-op.
      };
    }

    $('#refresh-btn').addEventListener('click', loadAgents);
    loadAgents();
  </script>
</body>
</html>
